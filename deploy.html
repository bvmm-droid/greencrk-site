<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BVMM Deploy</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#0e0c0b;color:#fff;padding:20px}h2{margin-bottom:4px;color:#fff;font-size:1.4rem}h2 span{color:#c9a84c}.sub{font-size:.82rem;color:rgba(255,255,255,.45);margin-bottom:24px}.card{background:#201c1a;border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:18px;margin-bottom:14px}.ctitle{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}.gold{color:#c9a84c}.red{color:#c0392b}.blue{color:#5b9bd5}.tag{border-radius:100px;padding:3px 10px;font-size:.55rem;font-weight:700;margin-left:8px}.tg{background:#c9a84c;color:#0e0c0b}.tr{background:#c0392b;color:#fff}.tb{background:#5b9bd5;color:#fff}label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(245,242,236,.4);margin-bottom:6px;display:block}input[type=text],input[type=password]{width:100%;background:#141110;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;font-size:.88rem;color:#fff;outline:none;margin-bottom:12px;-webkit-appearance:none;display:block}input[type=file]{width:100%;margin-bottom:6px;color:rgba(255,255,255,.5)}.fi{font-size:.72rem;color:#c9a84c;min-height:18px;margin-bottom:4px}.btn{width:100%;padding:13px;font-size:.9rem;font-weight:700;border:none;border-radius:100px;cursor:pointer;margin-top:6px}.btn:disabled{opacity:.35}.bg{background:#c9a84c;color:#0e0c0b}.br{background:#c0392b;color:#fff}.bb{background:#5b9bd5;color:#fff}.st{font-size:.8rem;padding:10px 14px;border-radius:8px;margin-top:10px;display:none;line-height:1.5}.sv{display:block}.ok{background:rgba(46,204,113,.1);color:#2ecc71;border:1px solid rgba(46,204,113,.2)}.er{background:rgba(192,57,43,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.2)}.ld{background:rgba(201,168,76,.1);color:#c9a84c;border:1px solid rgba(201,168,76,.2)}</style></head><body><h2>BVMM <span>Deploy</span></h2><p class="sub">One tool — deploy everything to greencrk.com</p><div class="card"><label>GitHub Token</label><input type="password" id="tok" value="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"><label>Repo</label><input type="text" id="repo" value="bvmm-droid/greencrk-site" style="margin-bottom:0"></div><div class="card"><div class="ctitle gold">Main website<span class="tag tg">index.html → greencrk.com</span></div><input type="file" id="sf" accept=".html" onchange="onF(this,'si','sb')"><div class="fi" id="si">No file chosen</div><button class="btn bg" id="sb" onclick="dep('sf','index.html','sb','ss')" disabled>Deploy Site → greencrk.com</button><div class="st" id="ss"></div></div><div class="card"><div class="ctitle red">Admin panel<span class="tag tr">admin.html → greencrk.com/admin</span></div><input type="file" id="af" accept=".html" onchange="onF(this,'ai','ab')"><div class="fi" id="ai">No file chosen</div><button class="btn br" id="ab" onclick="dep('af','admin.html','ab','as')" disabled>Deploy Admin → greencrk.com/admin</button><div class="st" id="as"></div></div><div class="card"><div class="ctitle blue">Update this tool<span class="tag tb">deploy.html</span></div><input type="file" id="df" accept=".html" onchange="onF(this,'di','db')"><div class="fi" id="di">No file chosen</div><button class="btn bb" id="db" onclick="dep('df','deploy.html','db','ds')" disabled>Update Deploy Tool</button><div class="st" id="ds"></div></div><script>var fc={};function onF(i,inf,btn){var f=i.files[0];if(!f)return;document.getElementById(inf).textContent="Reading "+f.name+"...";var r=new FileReader();r.onload=function(e){fc[i.id]=e.target.result;document.getElementById(inf).textContent=f.name+" ("+Math.round(f.size/1024)+" KB) — ready";document.getElementById(btn).disabled=false;};r.onerror=function(){document.getElementById(inf).textContent="Read error";};r.readAsText(f);}function dep(fid,target,btn,stid){var tok=document.getElementById("tok").value.trim();var repo=document.getElementById("repo").value.trim();var content=fc[fid];var b=document.getElementById(btn);var st=document.getElementById(stid);if(!content){show(st,"er","Choose a file first.");return;}b.disabled=true;show(st,"ld","Connecting to GitHub...");fetch("https://api.github.com/repos/"+repo+"/contents/"+target,{headers:{"Authorization":"token "+tok,"Accept":"application/vnd.github.v3+json"}}).then(function(r){return r.ok?r.json():null;}).then(function(d){show(st,"ld","Uploading "+target+"...");var enc=btoa(unescape(encodeURIComponent(content)));var body={message:"Update "+target+" via BVMM deploy tool",content:enc,branch:"main"};if(d&&d.sha)body.sha=d.sha;return fetch("https://api.github.com/repos/"+repo+"/contents/"+target,{method:"PUT",headers:{"Authorization":"token "+tok,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(body)});}).then(function(r){b.disabled=false;if(r&&r.ok){var urls={"index.html":"greencrk.com","admin.html":"greencrk.com/admin","deploy.html":"this page"};show(st,"ok","Done! Live at "+(urls[target]||target)+" in ~30 sec.");}else{r.json().then(function(e){show(st,"er","GitHub error: "+(e.message||r.status));});}}).catch(function(e){b.disabled=false;show(st,"er","Failed: "+e.message);});}function show(el,type,msg){el.className="st sv s"+type;el.textContent=msg;}</script></body></html>
