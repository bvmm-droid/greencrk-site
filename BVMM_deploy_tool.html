function deploy() {
  var btn = document.getElementById('btn');
  btn.disabled = true;
  setStep('s1','info','Deploying BVMM_push_live.html...');
  var xhr = new XMLHttpRequest();
  xhr.open('POST', WORKER, true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout = 60000;
  xhr.onload = function() {
    try {
      var r = JSON.parse(xhr.responseText);
      if (r.ok) {
        setStep('s1','ok','Deployed! ' + (r.commit||''));
        setStep('s2','ok','Wait 30 seconds, then open the manager.');
        document.getElementById('openBtn').style.display = 'block';
        btn.textContent = 'Done!';
      } else {
        setStep('s1','err','Error: ' + (r.error||'Unknown'));
        btn.disabled = false;
        btn.textContent = 'Try Again';
      }
    } catch(e) {
      setStep('s1','err','Bad response');
      btn.disabled = false;
      btn.textContent = 'Try Again';
    }
  };
  xhr.onerror = function() { setStep('s1','err','Network error'); btn.disabled=false; btn.textContent='Try Again'; };
  xhr.ontimeout = function() { setStep('s1','err','Timed out'); btn.disabled=false; btn.textContent='Try Again'; };
  xhr.send(JSON.stringify({action:'deploy', filename:'BVMM_push_live.html', content:FILE_B64}));
}

function setStep(id,type,text) {
  var el = document.getElementById(id);
  el.className = 'step' + (type ? ' show ' + type : '');
  el.textContent = text;
}
</script>
