<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BVMM Deploy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F4F1EB;color:#2C1810;font-family:Inter,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#FDFAF6;border:1px solid rgba(92,58,45,.15);border-radius:20px;padding:32px 28px;width:100%;max-width:420px}
  h1{font-size:1.4rem;margin-bottom:4px;text-align:center;color:#2C1810}
  h1 span{color:#A9B7A0}
  .sub{font-size:.75rem;color:rgba(44,24,16,.45);text-align:center;margin-bottom:28px}
  .section{background:rgba(92,58,45,.04);border:1px solid rgba(92,58,45,.10);border-radius:14px;padding:18px;margin-bottom:14px}
  .section-label{font-size:.55rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(92,58,45,.55);margin-bottom:10px}
  .chip{display:inline-block;background:rgba(92,58,45,.10);color:#5C3A2D;border:1px solid rgba(92,58,45,.20);border-radius:100px;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;margin-bottom:12px}
  label.pick{display:flex;align-items:center;gap:10px;background:rgba(92,58,45,.06);border:1px solid rgba(92,58,45,.12);border-radius:10px;padding:10px 14px;cursor:pointer;margin-bottom:6px}
  label.pick input{display:none}
  .fname{font-size:.75rem;color:rgba(44,24,16,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .fname.ready{color:#5a7a52;font-weight:600}
  .deploy-btn{width:100%;border:none;border-radius:12px;padding:13px;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:4px;transition:all .2s}
  .btn-main{background:#5C3A2D;color:#F4F1EB}
  .btn-main:hover{background:#7a4e3d}
  .btn-main:disabled{opacity:.45;cursor:not-allowed}
  .btn-admin{background:rgba(92,58,45,.7);color:#F4F1EB}
  .btn-admin:disabled{opacity:.45;cursor:not-allowed}
  .msg{margin-top:10px;font-size:.72rem;padding:9px 12px;border-radius:8px;display:none;text-align:left}
  .msg.ok{background:rgba(169,183,160,.18);color:#4a6a42;display:block}
  .msg.err{background:rgba(192,80,60,.10);color:#8B3A2D;display:block}
  .msg.info{background:rgba(138,159,178,.12);color:#4a6a80;display:block}
  .open-link{display:none;margin-top:10px;width:100%;text-align:center;background:#A9B7A0;color:#fff;border:none;border-radius:10px;padding:11px;font-size:.8rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;cursor:pointer}
  .open-link.show{display:block}
  .site-link{display:block;text-align:center;font-size:.75rem;color:#A9B7A0;text-decoration:none;letter-spacing:.05em;padding:14px 0 2px;border-top:1px solid rgba(92,58,45,.10);margin-top:8px}
  .site-link:hover{color:#5C3A2D}
</style>
</head>
<body>
<div class="card">
  <h1>BVMM <span>Deploy</span></h1>
  <p class="sub">Push any file live — no token needed</p>

  <div class="section">
    <div class="section-label">Main Website</div>
    <div class="chip">index.html → greencrk.com</div>
    <label class="pick">
      📁 <span class="fname" id="site-name">Choose HTML file…</span>
      <input type="file" id="site-file" accept=".html">
    </label>
    <button class="deploy-btn btn-main" id="site-btn" onclick="deployFile('site')">⬆ Deploy Site → greencrk.com</button>
    <div class="msg" id="site-msg"></div>
    <a href="https://greencrk.com" class="open-link" id="site-link" target="_blank">→ Open greencrk.com</a>
  </div>

  <div class="section">
    <div class="section-label">Admin Panel</div>
    <div class="chip" style="background:rgba(92,58,45,.08);color:#7a4e3d;border-color:rgba(92,58,45,.15)">admin.html → greencrk.com/admin</div>
    <label class="pick">
      📁 <span class="fname" id="admin-name">Choose HTML file…</span>
      <input type="file" id="admin-file" accept=".html">
    </label>
    <button class="deploy-btn btn-admin" id="admin-btn" onclick="deployFile('admin')">⬆ Deploy Admin Panel</button>
    <div class="msg" id="admin-msg"></div>
    <a href="https://greencrk.com/admin" class="open-link" id="admin-link" target="_blank">→ Open Admin Panel</a>
  </div>

  <a href="https://greencrk.com" class="site-link" target="_blank">→ greencrk.com</a>
</div>
<script>
var WORKER='https://bvmm-proxy.babylonvillagemeatmarket.workers.dev';
var fileData={};
['site','admin'].forEach(function(key){
  document.getElementById(key+'-file').addEventListener('change',function(){
    var f=this.files[0];if(!f)return;
    var nameEl=document.getElementById(key+'-name');
    nameEl.textContent=f.name+' ('+Math.round(f.size/1024)+' KB)';
    nameEl.className='fname ready';
    setMsg(key,'','');
    document.getElementById(key+'-link').className='open-link';
    var reader=new FileReader();
    reader.onload=function(e){fileData[key]=e.target.result.split(',')[1];};
    reader.onerror=function(){setMsg(key,'err','Could not read file.');};
    reader.readAsDataURL(f);
  });
});
function deployFile(key){
  if(!fileData[key]){setMsg(key,'err','Please choose a file first.');return;}
  var filename=key==='site'?'index.html':'admin.html';
  var btn=document.getElementById(key+'-btn');
  btn.disabled=true;btn.textContent='Uploading…';
  setMsg(key,'info','Sending to GitHub via Worker…');
  var xhr=new XMLHttpRequest();
  xhr.open('POST',WORKER,true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=60000;
  xhr.onload=function(){
    try{
      var res=JSON.parse(xhr.responseText);
      if(res.ok){
        setMsg(key,'ok','✅ Live! Commit: '+(res.commit||'ok'));
        btn.textContent='✅ Done!';
        setTimeout(function(){
          document.getElementById(key+'-link').className='open-link show';
        },2000);
      }else{
        setMsg(key,'err','✗ '+(res.error||'Unknown'));
        btn.disabled=false;
        btn.textContent=key==='site'?'⬆ Deploy Site → greencrk.com':'⬆ Deploy Admin Panel';
      }
    }catch(e){
      setMsg(key,'err','✗ Bad response');
      btn.disabled=false;
      btn.textContent=key==='site'?'⬆ Deploy Site → greencrk.com':'⬆ Deploy Admin Panel';
    }
  };
  xhr.onerror=function(){setMsg(key,'err','✗ Network error');btn.disabled=false;btn.textContent=key==='site'?'⬆ Deploy Site → greencrk.com':'⬆ Deploy Admin Panel';};
  xhr.ontimeout=function(){setMsg(key,'err','✗ Timed out');btn.disabled=false;btn.textContent=key==='site'?'⬆ Deploy Site → greencrk.com':'⬆ Deploy Admin Panel';};
  xhr.send(JSON.stringify({action:'deploy',filename:filename,content:fileData[key]}));
}
function setMsg(key,type,text){
  var el=document.getElementById(key+'-msg');
  el.className='msg'+(type?' '+type:'');
  el.textContent=text;
}
</script>
</body>
</html>
