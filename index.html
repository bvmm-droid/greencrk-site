<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BVMM Deploy</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0c0a;color:#fff;font-family:Inter,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#1a1410;border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:32px 28px;width:100%;max-width:420px}
  h1{font-size:1.4rem;margin-bottom:4px;text-align:center}
  h1 span{color:#c9a84c}
  .sub{font-size:.75rem;color:rgba(255,255,255,.4);text-align:center;margin-bottom:28px}
  .section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px;margin-bottom:14px}
  .section-label{font-size:.55rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(201,168,76,.7);margin-bottom:10px}
  .chip{display:inline-block;background:rgba(201,168,76,.15);color:#c9a84c;border:1px solid rgba(201,168,76,.3);border-radius:100px;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;margin-bottom:12px}
  label.pick{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 14px;cursor:pointer;margin-bottom:6px}
  label.pick input{display:none}
  .fname{font-size:.75rem;color:rgba(255,255,255,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .fname.ready{color:#6ecfa3}
  .deploy-btn{width:100%;border:none;border-radius:12px;padding:13px;font-size:.82rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:4px;transition:all .2s}
  .btn-main{background:#c9a84c;color:#111}
  .btn-main:hover{background:#e2c97e}
  .btn-main:disabled{opacity:.45;cursor:not-allowed;background:#888}
  .msg{margin-top:10px;font-size:.72rem;padding:9px 12px;border-radius:8px;display:none}
  .msg.ok{background:rgba(110,207,163,.12);color:#6ecfa3;display:block}
  .msg.err{background:rgba(224,112,112,.12);color:#e07070;display:block}
  .msg.info{background:rgba(201,168,76,.08);color:rgba(201,168,76,.9);display:block}
</style>
</head>
<body>
<div class="card">
  <h1>BVMM <span>Deploy</span></h1>
  <p class="sub">Push any file live to greencrk.com — no token needed</p>

  <!-- MAIN SITE -->
  <div class="section">
    <div class="section-label">Main Website</div>
    <div class="chip">index.html → greencrk.com</div>
    <label class="pick">
      📁 <span class="fname" id="site-name">Choose HTML file…</span>
      <input type="file" id="site-file" accept=".html">
    </label>
    <button class="deploy-btn btn-main" id="site-btn" onclick="deployFile('site')">Deploy Site → greencrk.com</button>
    <div class="msg" id="site-msg"></div>
  </div>

  <!-- ADMIN -->
  <div class="section">
    <div class="section-label">Admin Panel</div>
    <div class="chip" style="background:rgba(192,80,60,.15);color:#c0503c;border-color:rgba(192,80,60,.3)">admin.html → greencrk.com/admin</div>
    <label class="pick">
      📁 <span class="fname" id="admin-name">Choose HTML file…</span>
      <input type="file" id="admin-file" accept=".html">
    </label>
    <button class="deploy-btn" id="admin-btn" onclick="deployFile('admin')" style="background:rgba(192,80,60,.8);color:#fff;margin-top:4px">Deploy Admin → greencrk.com/admin</button>
    <div class="msg" id="admin-msg"></div>
  </div>

</div>
<script>
var WORKER = 'https://bvmm-proxy.babylonvillagemeatmarket.workers.dev';
var fileData = {};

['site','admin'].forEach(function(key){
  document.getElementById(key+'-file').addEventListener('change', function(){
    var f = this.files[0];
    if(!f) return;
    var nameEl = document.getElementById(key+'-name');
    nameEl.textContent = f.name + ' (' + Math.round(f.size/1024) + ' KB)';
    nameEl.className = 'fname ready';
    setMsg(key, '', '');

    var reader = new FileReader();
    reader.onload = function(e){
      fileData[key] = e.target.result.split(',')[1]; // base64 from dataURL
    };
    reader.onerror = function(){ setMsg(key,'err','Could not read file.'); };
    reader.readAsDataURL(f);
  });
});

function deployFile(key){
  if(!fileData[key]){ setMsg(key,'err','Please choose a file first.'); return; }
  var filename = key === 'site' ? 'index.html' : 'admin.html';
  var btn = document.getElementById(key+'-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  setMsg(key,'info','Sending to GitHub via Worker…');

  var xhr = new XMLHttpRequest();
  xhr.open('POST', WORKER, true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout = 60000;
  xhr.onload = function(){
    try{
      var res = JSON.parse(xhr.responseText);
      if(res.ok){
        setMsg(key,'ok','✅ Live! Commit: ' + (res.commit||'ok') + ' — updates in ~30 seconds');
        btn.textContent = '✅ Done!';
      } else {
        setMsg(key,'err','✗ Error: ' + (res.error||'Unknown'));
        btn.disabled = false;
        btn.textContent = key==='site' ? 'Deploy Site → greencrk.com' : 'Deploy Admin → greencrk.com/admin';
      }
    } catch(e){
      setMsg(key,'err','✗ Bad response');
      btn.disabled = false;
      btn.textContent = key==='site' ? 'Deploy Site → greencrk.com' : 'Deploy Admin → greencrk.com/admin';
    }
  };
  xhr.onerror = function(){ setMsg(key,'err','✗ Network error'); btn.disabled=false; btn.textContent=key==='site'?'Deploy Site → greencrk.com':'Deploy Admin'; };
  xhr.ontimeout = function(){ setMsg(key,'err','✗ Timed out — try again'); btn.disabled=false; btn.textContent=key==='site'?'Deploy Site → greencrk.com':'Deploy Admin'; };
  xhr.send(JSON.stringify({action:'deploy', filename:filename, content:fileData[key]}));
}

function setMsg(key,type,text){
  var el = document.getElementById(key+'-msg');
  el.className = 'msg' + (type ? ' '+type : '');
  el.textContent = text;
}
</script>
</body>
</html>
